services:
  - type: web
    name: shared-portal-timer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 8 --timeout 0 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
