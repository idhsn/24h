<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shared Grunge Portal Timer</title>
<style>
:root{
  --paper:#f1f1ed;
  --red:#c42d2d;
  --ink:#f7f7f2;
  --speed:1;
  --glow:.75;
}
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;background:transparent;
  font-family:Impact,Haettenschweiler,"Arial Narrow Bold","Arial Narrow",sans-serif;
}
body{display:grid;place-items:center}
.stage{
  position:relative;
  width:min(94vw,1500px);
  aspect-ratio:16/7.4;
  display:grid;
  place-items:center;
  transform:translateZ(0);
}
.poster{
  position:relative;
  width:92%;
  height:78%;
  color:var(--ink);
  isolation:isolate;
  filter:drop-shadow(0 18px 24px rgba(0,0,0,.4));
}
.back-strip{
  position:absolute;
  inset:6% -4%;
  transform:rotate(-2.2deg);
  background:
    repeating-linear-gradient(91deg,rgba(0,0,0,.13) 0 1px,transparent 1px 7px),
    var(--paper);
  clip-path:polygon(1% 8%,98% 0,100% 91%,3% 100%,0 74%);
}
.back-strip:after{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 15% 30%,rgba(0,0,0,.22) 0 1px,transparent 2px),
    radial-gradient(circle at 75% 70%,rgba(0,0,0,.16) 0 1px,transparent 2px);
  background-size:17px 19px,23px 27px;mix-blend-mode:multiply;opacity:.38;
}
.red-orbit{
  position:absolute;
  width:24%;aspect-ratio:1;left:29%;top:-8%;
  border-radius:50%;
  border:clamp(22px,3vw,48px) solid var(--red);
  opacity:.95;
  animation:redFloat calc(5s / var(--speed)) ease-in-out infinite;
}
.black-card{
  position:absolute;inset:0;
  clip-path:polygon(2% 2%,98% 0,100% 93%,95% 96%,96% 100%,4% 98%,0 91%,1% 8%);
  background:
    linear-gradient(103deg,transparent 0 18%,rgba(255,255,255,.026) 18.2% 18.5%,transparent 18.8% 100%),
    radial-gradient(ellipse at 35% 14%,rgba(255,255,255,.08),transparent 36%),
    #070707;
  overflow:hidden;
}
.black-card:before,.black-card:after{
  content:"";position:absolute;inset:-8%;
  pointer-events:none;
}
.black-card:before{
  background:
    repeating-radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.04) 0 1px,transparent 2px 5px),
    repeating-linear-gradient(172deg,transparent 0 9px,rgba(255,255,255,.035) 10px,transparent 11px 20px);
  opacity:.48;mix-blend-mode:screen;animation:grain .8s steps(2) infinite;
}
.black-card:after{
  background:
    linear-gradient(92deg,transparent 3%,rgba(255,255,255,.18) 3.2%,transparent 3.7%),
    linear-gradient(88deg,transparent 96%,rgba(255,255,255,.12) 96.2%,transparent 96.8%);
  opacity:.7;
}
.portal{
  position:absolute;z-index:2;left:17%;right:17%;top:12%;bottom:10%;
  pointer-events:none;filter:drop-shadow(0 0 calc(8px * var(--glow)) rgba(255,255,255,.45));
}
.portal-ring,.portal-ring:before,.portal-ring:after{
  position:absolute;content:"";border-radius:50%;inset:0;
}
.portal-ring{
  border:clamp(2px,.25vw,5px) solid rgba(241,241,237,.72);
  transform:perspective(850px) rotateX(68deg);
  animation:portalSpin calc(9s / var(--speed)) linear infinite;
  clip-path:polygon(0 0,100% 7%,96% 27%,100% 49%,94% 73%,100% 100%,0 94%,5% 71%,0 52%,6% 25%);
}
.portal-ring:before{
  inset:-7%;
  border:clamp(1px,.18vw,4px) dashed rgba(241,241,237,.58);
  animation:portalSpinReverse calc(6s / var(--speed)) linear infinite;
}
.portal-ring:after{
  inset:8%;
  border:clamp(2px,.2vw,4px) solid color-mix(in srgb,var(--red) 65%,transparent);
  box-shadow:0 0 calc(18px * var(--glow)) rgba(196,45,45,.7);
  animation:portalPulse calc(2.2s / var(--speed)) ease-in-out infinite;
}
.portal-scratch{
  position:absolute;inset:10% 4%;
  border-radius:50%;
  transform:perspective(850px) rotateX(68deg) rotate(15deg);
  background:repeating-conic-gradient(
    from 10deg,
    transparent 0 7deg,
    rgba(241,241,237,.5) 8deg 9deg,
    transparent 10deg 18deg
  );
  -webkit-mask:radial-gradient(ellipse,transparent 0 54%,#000 56% 60%,transparent 63%);
  mask:radial-gradient(ellipse,transparent 0 54%,#000 56% 60%,transparent 63%);
  animation:portalSpinReverse calc(13s / var(--speed)) linear infinite;
}
.vertical{
  position:absolute;z-index:5;top:9%;bottom:8%;
  display:flex;align-items:center;justify-content:center;
  writing-mode:vertical-rl;text-orientation:mixed;
  letter-spacing:.14em;text-transform:uppercase;font-weight:900;
  font-size:clamp(16px,2.2vw,40px);line-height:.9;
  color:var(--paper);
  text-shadow:3px 3px 0 #000;
}
.vertical.left{left:2.2%;transform:rotate(180deg)}
.vertical.right{right:2.1%}
.content{
  position:absolute;z-index:6;inset:8% 10%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
}
.title{
  max-width:74%;
  font-size:clamp(26px,4.9vw,82px);
  letter-spacing:.025em;line-height:.78;text-transform:uppercase;
  transform:scaleX(.73);
  font-weight:950;
  text-shadow:5px 5px 0 rgba(0,0,0,.75);
  margin-bottom:clamp(8px,1vw,16px);
}
.timer-wrap{
  position:relative;width:78%;padding:1.2% 3% 1.8%;
}
.timer-wrap:before,.timer-wrap:after{
  content:"";position:absolute;left:0;right:0;height:clamp(2px,.28vw,5px);
  background:var(--paper);
  clip-path:polygon(0 42%,4% 0,17% 60%,29% 18%,44% 65%,61% 25%,78% 72%,91% 11%,100% 54%,96% 100%,79% 50%,63% 86%,43% 34%,27% 78%,12% 26%);
}
.timer-wrap:before{top:0}.timer-wrap:after{bottom:0;transform:scaleX(-1)}
.timer{
  font-family:Impact,Haettenschweiler,"Arial Narrow Bold","Arial Narrow",sans-serif;
  font-size:clamp(54px,9.3vw,154px);
  line-height:.82;letter-spacing:.035em;white-space:nowrap;
  font-variant-numeric:tabular-nums;
  transform:scaleX(.8);
  text-shadow:
    3px 3px 0 #000,
    -1px 0 0 rgba(255,255,255,.45),
    0 0 calc(12px * var(--glow)) rgba(255,255,255,.3);
}
.host{
  margin-top:clamp(8px,1.1vw,18px);
  font-size:clamp(18px,2.4vw,42px);
  letter-spacing:.12em;text-transform:uppercase;
  transform:scaleX(.82);
}
.live-mark{
  position:absolute;z-index:7;right:8%;bottom:3%;
  display:flex;align-items:center;gap:8px;font-family:Arial,sans-serif;
  font-size:clamp(8px,.9vw,14px);font-weight:900;letter-spacing:.16em;
}
.live-mark i{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red)}
.live-mark.running i{animation:blink .9s ease-in-out infinite}
.zero .timer{animation:zeroHit .7s steps(2) infinite}
@keyframes grain{
  0%{transform:translate(0,0)}
  25%{transform:translate(1.5%,-1%)}
  50%{transform:translate(-1%,1.5%)}
  75%{transform:translate(.8%,.6%)}
}
@keyframes portalSpin{to{transform:perspective(850px) rotateX(68deg) rotate(360deg)}}
@keyframes portalSpinReverse{to{transform:perspective(850px) rotateX(68deg) rotate(-360deg)}}
@keyframes portalPulse{50%{inset:4%;opacity:.55}}
@keyframes redFloat{50%{transform:translate(4%,-5%) rotate(10deg)}}
@keyframes blink{50%{opacity:.18}}
@keyframes zeroHit{50%{transform:scaleX(.8) translateX(5px);filter:invert(1)}}
@media(max-width:720px){
  .poster{width:98%;height:82%}
  .content{inset:8% 8%}
  .title{max-width:68%}
}
</style>
</head>
<body>
<main class="stage" id="stage">
  <section class="poster">
    <div class="back-strip"></div>
    <div class="red-orbit"></div>
    <div class="black-card"></div>

    <div class="portal">
      <div class="portal-ring"></div>
      <div class="portal-scratch"></div>
    </div>

    <div class="vertical left" id="verticalLeft">24 HOURS</div>
    <div class="vertical right" id="verticalRight">LIVE WITH</div>

    <div class="content">
      <div class="title" id="title">24 HOURS OF CHAOS</div>
      <div class="timer-wrap"><div class="timer" id="timer">24:00:00</div></div>
      <div class="host" id="host">YOUR NAME</div>
    </div>

    <div class="live-mark" id="liveMark"><i></i><span id="status">PAUSED</span></div>
  </section>
</main>

<script>
const $ = selector => document.querySelector(selector);
let state = null;
let serverOffsetMs = 0;

function formatTime(seconds, showHundredths){
  seconds = Math.max(0, Number(seconds) || 0);
  const totalMs = Math.floor(seconds * 1000);
  const hours = Math.floor(totalMs / 3600000);
  const minutes = Math.floor((totalMs % 3600000) / 60000);
  const secs = Math.floor((totalMs % 60000) / 1000);
  const hundredths = Math.floor((totalMs % 1000) / 10);
  const base = `${String(hours).padStart(2,"0")}:${String(minutes).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  return showHundredths ? `${base}.${String(hundredths).padStart(2,"0")}` : base;
}

function serverNowSeconds(){
  return (Date.now() + serverOffsetMs) / 1000;
}

function remaining(){
  if(!state) return 0;
  if(state.running && state.end_time) return Math.max(0, state.end_time - serverNowSeconds());
  return Math.max(0, Number(state.remaining_seconds) || 0);
}

function applyState(){
  if(!state) return;
  $("#title").textContent = state.title || "";
  $("#verticalRight").textContent = state.subtitle || "LIVE WITH";
  $("#host").textContent = state.host_name || "";
  $("#status").textContent = state.running ? "LIVE" : "PAUSED";
  $("#liveMark").classList.toggle("running", !!state.running);

  document.documentElement.style.setProperty("--paper", state.primary_color || "#f1f1ed");
  document.documentElement.style.setProperty("--red", state.secondary_color || "#c42d2d");
  document.documentElement.style.setProperty("--ink", state.text_color || "#f7f7f2");
  document.documentElement.style.setProperty("--speed", Math.max(.2, Number(state.portal_speed) || 1));
  document.documentElement.style.setProperty("--glow", Math.max(.1, Number(state.glow_strength) || .75));
}

function render(){
  if(state){
    const left = remaining();
    $("#timer").textContent = formatTime(left, !!state.show_milliseconds);
    $("#stage").classList.toggle("zero", left <= .001);
  }
  requestAnimationFrame(render);
}

async function sync(){
  try{
    const sent = Date.now();
    const response = await fetch(`/api/state?t=${sent}`, {cache:"no-store"});
    if(!response.ok) return;
    const received = Date.now();
    const next = await response.json();
    const midpoint = (sent + received) / 2;
    serverOffsetMs = next.server_time * 1000 - midpoint;
    state = next;
    applyState();
  }catch(error){}
}

sync();
setInterval(sync, 500);
render();
</script>
</body>
</html>
